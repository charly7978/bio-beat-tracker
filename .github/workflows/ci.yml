# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # SHA = tags oficiales (el validador del IDE a veces no resuelve @v* sin red/GitHub login)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      # Peer Vite 8 + @vitejs/plugin-react-swc ≥4.3 (ver package.json). No hace falta --legacy-peer-deps.
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Repo hygiene (orphan imports)
        run: bun run check:orphans
      - name: Architecture guardrails
        run: bun run check:architecture
      - name: Anti-simulation guardrail
        run: bun run check:no-sim
      - name: Tests
        run: bun run test -- --run
      - name: Build
        run: bun run build
      - name: Anti-simulation guardrail (dist)
        run: bun run check:no-sim:dist
