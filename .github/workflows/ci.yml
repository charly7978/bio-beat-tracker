# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cleanup_non_main_branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete every branch except main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const failures = [];
            for (const branch of branches) {
              if (branch.name === 'main') continue;
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                core.info(`Deleted branch: ${branch.name}`);
              } catch (error) {
                failures.push(`${branch.name}: ${error.message}`);
                core.warning(`Could not delete ${branch.name}: ${error.message}`);
              }
            }

            if (failures.length > 0) {
              core.setFailed(`Some branches could not be deleted:\n${failures.join('\n')}`);
            }

  quality:
    runs-on: ubuntu-latest
    steps:
      # SHA = tags oficiales (el validador del IDE a veces no resuelve @v* sin red/GitHub login)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Repo hygiene (orphan imports)
        run: bun run check:orphans
      - name: Architecture guardrails
        run: bun run check:architecture
      - name: Anti-simulation guardrail
        run: bun run check:no-sim
      - name: Tests
        run: bun run test -- --run
      - name: Build
        run: bun run build
      - name: Anti-simulation guardrail (dist)
        run: bun run check:no-sim:dist
