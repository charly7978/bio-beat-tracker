name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Repo hygiene (orphan imports)
        run: bun run check:orphans
      - name: Anti-simulation guardrail
        run: bun run check:no-sim
      - name: Tests
        run: bun run test -- --run
      - name: Build
        run: bun run build
      - name: Anti-simulation guardrail (dist)
        run: bun run check:no-sim:dist
