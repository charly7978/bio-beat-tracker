name: One-shot cleanup non-main branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-non-main-branches.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keep = 'main';

            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const failures = [];
            for (const branch of branches) {
              if (branch.name === keep) {
                core.info(`Keeping ${keep}`);
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                core.info(`Deleted branch: ${branch.name}`);
              } catch (error) {
                failures.push(`${branch.name}: ${error.message}`);
                core.warning(`Could not delete ${branch.name}: ${error.message}`);
              }
            }

            if (failures.length > 0) {
              core.setFailed(`Some branches could not be deleted:\n${failures.join('\n')}`);
            }
